<!DOCTYPE html>
<html style="--primary-color: #0074BD; --primary-color-2: #0074BD; --primary-color-hover: #005a94; --secondary-color: #005a94;">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' https: data:; connect-src 'self' https://abgizefxtsrakahwzrcy.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Inventory - CORVIXZ</title>
    <link rel="icon" type="image/x-icon" href="../images/logo/f.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../styles.css"/>
    <script src="../js/config.js"></script>
    <script src="../js/client.js"></script>
    <script src="../js/auth/guard.js"></script>
</head>
<body class="theme-2016">
    <div id="__next">
        <div class="page-shell">
            <div id="navbar-placeholder"></div>
            <div class="container-0-2-4">
                <div id="ad-slot"></div>
                <div class="page-wrap inventory-page-wrap">
                    <div class="row">
                        <div class="col-12">
                            <h1 class="inventory-main-title" id="inventoryPageTitle">Inventory</h1>
                        </div>
                        <div class="col-12 col-lg-2">
                            <div class="inventory-category-panel">
                                <h2 class="inventory-category-title">CATEGORY</h2>
                                <div id="inventoryCategoryList"></div>
                            </div>
                        </div>
                        <div class="col-12 col-lg-10">
                            <h2 class="inventory-grid-title" id="inventoryCategoryLabel">HATS</h2>
                            <p class="inventory-showing-label" id="inventoryShowingLabel"></p>
                            <div class="row" id="inventoryGrid"></div>
                            <div class="inventory-paging" id="inventoryPaging" style="display:none;">
                                <button type="button" class="inventory-paging-btn" id="invPrevBtn" onclick="inventoryPrevPage()">Previous</button>
                                <span class="inventory-paging-info" id="invPageInfo"></span>
                                <button type="button" class="inventory-paging-btn" id="invNextBtn" onclick="inventoryNextPage()">Next</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="footer-placeholder"></div>
        </div>
    </div>

    <script src="../js/auth/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui/include.js"></script>
    <script>
    var INVENTORY_CATEGORIES = [
        { name: 'Hats', value: 'Hat' },
        { name: 'Hair', value: 'Hair' },
        { name: 'Faces', value: 'Face' },
        { name: 'Gears', value: 'Gear' },
        { name: 'Accessories', value: 'Accessory' }
    ];
    var INV_PAGE_SIZE = 24;
    var inventoryUserId = null;
    var inventoryUserNumber = null;
    var inventoryUserName = 'User';
    var allInventory = [];
    var filteredInventory = [];
    var selectedCategory = 'Hat';
    var currentPage = 1;

    function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function renderCategoryList() {
        var html = '';
        INVENTORY_CATEGORIES.forEach(function(cat) {
            html += '<div class="inventory-category-option' + (selectedCategory === cat.value ? ' selected' : '') + '" onclick="selectInventoryCategory(\'' + cat.value + '\')">' + esc(cat.name) + '</div>';
        });
        document.getElementById('inventoryCategoryList').innerHTML = html;
    }

    function selectInventoryCategory(value) {
        selectedCategory = value;
        currentPage = 1;
        renderCategoryList();
        filterAndRender();
    }

    function filterInventory() {
        filteredInventory = allInventory.filter(function(entry) {
            var item = entry.item;
            if (!item) return false;
            return item.item_type === selectedCategory;
        });
    }

    function getPageItems() {
        var start = (currentPage - 1) * INV_PAGE_SIZE;
        return filteredInventory.slice(start, start + INV_PAGE_SIZE);
    }

    function updateShowingLabel() {
        var el = document.getElementById('inventoryShowingLabel');
        var cat = INVENTORY_CATEGORIES.find(function(c) { return c.value === selectedCategory; });
        document.getElementById('inventoryCategoryLabel').textContent = (cat ? cat.name : 'Items').toUpperCase();
        if (!filteredInventory.length) {
            el.textContent = '';
            return;
        }
        var start = (currentPage - 1) * INV_PAGE_SIZE + 1;
        var end = Math.min(currentPage * INV_PAGE_SIZE, filteredInventory.length);
        el.textContent = 'Showing ' + start + ' to ' + end + ' of ' + filteredInventory.length;
    }

    function renderGrid() {
        var grid = document.getElementById('inventoryGrid');
        var paging = document.getElementById('inventoryPaging');
        if (!filteredInventory.length) {
            grid.innerHTML = '<div class="col-12"><p class="inventory-empty-msg">Player does not have any items in this category.</p></div>';
            paging.style.display = 'none';
            updateShowingLabel();
            return;
        }
        var items = getPageItems();
        var html = '';
        items.forEach(function(entry) {
            var item = entry.item;
            if (!item) return;
            var creator = item.creator || {};
            var creatorName = creator.username || 'Unknown';
            var creatorLink = creator.user_number ? 'profile.html?id=' + creator.user_number : '#';
            var itemLink = 'item.html?id=' + (item.item_number || item.id);
            var img = item.image_url || 'images/logo/f.png';
            html += '<div class="col-4 col-md-3 col-lg-2 ps-1 pe-1 inventory-item-col">';
            html += '<a href="' + itemLink + '" class="inventory-item-card">';
            html += '<div class="inventory-item-img-wrap"><img src="' + esc(img) + '" alt="' + esc(item.name) + '"/></div>';
            html += '<div class="inventory-item-info">';
            html += '<div class="inv-name">' + esc(item.name) + '</div>';
            html += '<div class="inv-by">By <span class="inv-creator" onclick="event.cancelBubble=true;location.href=\'' + creatorLink + '\'">' + esc(creatorName) + '</span></div>';
            html += '</div></a></div>';
        });
        grid.innerHTML = html;
        updateShowingLabel();

        var totalPages = Math.ceil(filteredInventory.length / INV_PAGE_SIZE);
        if (totalPages > 1) {
            paging.style.display = 'flex';
            document.getElementById('invPageInfo').textContent = 'Page ' + currentPage + ' of ' + totalPages;
            document.getElementById('invPrevBtn').disabled = currentPage <= 1;
            document.getElementById('invNextBtn').disabled = currentPage >= totalPages;
        } else {
            paging.style.display = 'none';
        }
    }

    function filterAndRender() {
        filterInventory();
        renderGrid();
    }

    function inventoryPrevPage() {
        if (currentPage > 1) { currentPage--; renderGrid(); }
    }

    function inventoryNextPage() {
        var totalPages = Math.ceil(filteredInventory.length / INV_PAGE_SIZE);
        if (currentPage < totalPages) { currentPage++; renderGrid(); }
    }

    async function resolveProfileId() {
        var params = new URLSearchParams(window.location.search);
        var rawId = params.get('id');
        if (!rawId) {
            if (currentProfile) {
                inventoryUserId = currentProfile.id;
                inventoryUserName = currentProfile.display_name || currentProfile.username;
            }
            return;
        }
        if (/^\d+$/.test(rawId)) {
            var res = await supabaseFetch(API_URL + '/profiles?select=*&user_number=eq.' + parseInt(rawId, 10) + '&limit=1', { headers: authHeaders() });
            if (res && res[0]) {
                inventoryUserId = res[0].id;
                inventoryUserName = res[0].display_name || res[0].username;
                inventoryUserNumber = res[0].user_number;
                return;
            }
        }
        try {
            var profile = await getProfile(rawId);
            if (profile) {
                inventoryUserId = profile.id;
                inventoryUserName = profile.display_name || profile.username;
                inventoryUserNumber = profile.user_number;
            }
        } catch(e) {}
    }

    async function loadInventoryPage() {
        await resolveProfileId();
        if (!inventoryUserId) {
            document.getElementById('inventoryGrid').innerHTML = '<div class="col-12"><p class="inventory-empty-msg">User not found.</p></div>';
            return;
        }
        var ownerHref = inventoryUserNumber ? 'profile.html?id=' + inventoryUserNumber : '#';
        document.getElementById('inventoryPageTitle').innerHTML = '<a href="' + esc(ownerHref) + '" style="color:inherit;text-decoration:none;">' + esc(inventoryUserName) + '</a>\'s Inventory';
        document.title = inventoryUserName + "'s Inventory - CORVIXZ";
        renderCategoryList();
        try {
            allInventory = await getUserInventory(inventoryUserId) || [];
            filterAndRender();
            if (typeof updateDynamicElements === 'function') updateDynamicElements();
        } catch(e) {
            document.getElementById('inventoryGrid').innerHTML = '<div class="col-12"><p class="inventory-empty-msg">Error loading inventory.</p></div>';
        }
    }

    var check = setInterval(function() {
        if (currentProfile) { clearInterval(check); loadInventoryPage(); }
    }, 100);
    </script>
</body>
</html>
