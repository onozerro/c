<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' https: data:; connect-src 'self' https://abgizefxtsrakahwzrcy.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CORVIXZ</title>
    <meta name="description" content="Experience nostalgia once again with CORVIXZ."/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../images/logo/f.png">
    <style>
        body { font-family: 'Source Sans Pro', sans-serif; overflow-x: hidden; margin: 0; }
        .landing-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('images/logo/fon.png') center/cover; z-index: 0; }

        .landing-navbar { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(0,0,0,0.55); padding: 12px 16px; display: flex; align-items: center; gap: 12px; min-height: 56px; box-sizing: border-box; }

        .landing-content { position: relative; z-index: 10; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; padding-top: 60px; padding-bottom: 20px; min-height: 100vh; }

        .signup-panel { background: #dcdce1; padding: 25px; border-radius: 0; width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); margin: 20px; }
        .signup-panel form { width: 100%; }
        .signup-panel .form-control { width: 100%; box-sizing: border-box; border-radius: 0; }
        .signup-panel .btn { width: 100%; box-sizing: border-box; border-radius: 0; }
        .custom-btn-primary { background-color: #004696; border-color: #004696; color: white; }
        .custom-btn-primary:hover { background-color: #003070; border-color: #003070; color: white; }
        .invite-field-wrap { position: relative; }
        .invite-field-wrap .invite-btn { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); background-color: #5865F2; border-color: #5865F2; color: #fff; font-size: 12px; padding: 3px 12px; border-radius: 24px; text-decoration: none; font-weight: 700; display: inline-flex; align-items: center; z-index: 5; }
        .invite-field-wrap .invite-btn:hover { background-color: #4752C4; border-color: #4752C4; color: #fff; }

        .copyright-footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.55); color: #ccc; font-size: 10px; text-align: center; padding: 5px; z-index: 50; border-top: 1px solid rgba(0,0,0,0.4); }

        .login-modal-overlay {
            position: fixed; inset: 0; z-index: 500; display: none;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .login-modal-overlay.open { display: flex; }
        .login-panel {
            background: #dcdce1; padding: 25px 25px 20px; border-radius: 0;
            width: 380px; max-width: 92vw; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            position: relative; margin: auto; box-sizing: border-box;
        }
        .login-panel-header { position: relative; text-align: center; margin-bottom: 1rem; min-height: 28px; }
        .login-panel-header h2 { font-size: 1.25rem; font-weight: 700; margin: 0; padding: 0; color: #191919; }
        .login-panel form { width: 100%; margin: 0; padding: 0; }
        .login-panel .form-control {
            width: 100%; box-sizing: border-box; border-radius: 0;
            display: block; margin: 0 0 0.5rem 0;
        }
        .login-panel .form-control:last-of-type { margin-bottom: 1rem; }
        .login-panel .btn { width: 100%; box-sizing: border-box; border-radius: 0; margin: 0; }
        .login-modal-close {
            position: absolute; top: -2px; right: 0; background: none; border: none;
            font-size: 24px; color: #666; cursor: pointer; line-height: 1; padding: 0;
        }
        .login-modal-close:hover { color: #000; }

        @media (max-width: 900px) {
            .landing-navbar { min-height: 50px; flex-wrap: wrap; }
            .landing-content { flex-direction: column; padding-top: 120px; }
            .signup-panel, .login-panel { width: 95%; margin: 10px auto; }
        }
    </style>
</head>
<body>
    <div class="landing-bg"></div>

    <nav class="landing-navbar">
        <a href="/"><img src="../images/logo/logo17.png" height="30" alt="Logo"></a>
        <button type="button" class="btn btn-sm custom-btn-primary fw-bold ms-auto" id="openLoginBtn">Log In</button>
    </nav>

    <div class="landing-content">
        <div class="landing-center text-center px-4">
            <img src="../images/logo/logowelcome.png" width="350" alt="CORVIXZ">
            <div class="bg-dark bg-opacity-50 text-white p-2 mt-1 fs-4">Repowering Imagination&#8482;</div>
        </div>

        <div class="signup-panel">
            <h2 class="fs-5 fw-bold text-center mb-3 text-dark">SIGN UP NOW</h2>

            <form method="post" id="signupForm" onsubmit="return false;">
                <input type="text" name="signupUsername" id="signupUsername" class="form-control mb-2" placeholder="Username" required>
                <input type="password" name="signupPassword" id="signupPassword" class="form-control mb-2" placeholder="Password" required>
                <input type="password" name="signupConfirmPassword" id="signupConfirmPassword" class="form-control mb-2" placeholder="Confirm Password" required>
                <div class="invite-field-wrap mb-3">
                    <input type="text" name="signupInviteKey" id="signupInviteKey" class="form-control" placeholder="Invite Code" required>
                    <a href="https://discord.gg/2p9tmJwPU7" target="_blank" class="invite-btn"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-3px;margin-right:4px;"><path d="M20.317 4.369a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.249a18.27 18.27 0 0 0-5.487 0 12.6 12.6 0 0 0-.617-1.25.077.077 0 0 0-.079-.036A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.061 0a.074.074 0 0 1 .078.009c.12.099.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.029zM8.02 15.331c-1.182 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg> Get Invite Code</a>
                </div>

                <button type="button" id="signupSubmitBtn" class="btn w-100 fw-bold custom-btn-primary">Sign Up</button>
                <div id="signupError" class="text-danger mt-2" style="font-size:13px;display:none;"></div>
            </form>

            <div class="mt-2 d-flex justify-content-between" style="font-size:12px;">
                <a href="#" class="text-muted" id="openLoginLink">Already have an account? Login!</a>
                <a href="#" class="text-muted" id="openLoginForgot">Forgot password?</a>
            </div>
        </div>
    </div>

    <div class="copyright-footer">
        &copy; 2026 CORVIXZ. Not affiliated with Roblox Corporation.
    </div>

    <div class="login-modal-overlay" id="loginModal">
        <div class="login-panel">
            <div class="login-panel-header">
                <button type="button" class="login-modal-close" id="closeLoginBtn" aria-label="Close">&times;</button>
                <h2>LOG IN</h2>
            </div>
            <form method="post" id="loginForm" onsubmit="return false;">
                <input type="text" name="loginUsername" id="loginUsername" class="form-control mb-2" placeholder="Username" required>
                <input type="password" name="loginPassword" id="loginPassword" class="form-control mb-3" placeholder="Password" required>
                <button type="button" id="loginSubmitBtn" class="btn w-100 fw-bold custom-btn-primary">Log In</button>
                <div id="loginError" class="text-danger mt-2" style="font-size:13px;display:none;"></div>
            </form>
            <div class="mt-2 d-flex justify-content-between" style="font-size:12px;">
                <a href="#" class="text-muted" id="forgotPasswordLink">Forgot password?</a>
            </div>
        </div>
    </div>

        <script src="../js/config.js"></script>
        <script src="../js/client.js"></script>
        <script src="../js/auth/auth.js"></script>
        <script src="../js/discord/webhook.js"></script>
        <script src="../js/auth/guard.js"></script>
    <script>
    (function() {
        var loginModal = document.getElementById('loginModal');
        var loginUsername = document.getElementById('loginUsername');
        var loginPassword = document.getElementById('loginPassword');
        var loginError = document.getElementById('loginError');

        function openLoginModal() {
            loginModal.classList.add('open');
            loginError.style.display = 'none';
            document.body.style.overflow = 'hidden';
            setTimeout(function() { loginUsername.focus(); }, 100);
        }
        function closeLoginModal() {
            loginModal.classList.remove('open');
            document.body.style.overflow = '';
        }

        document.getElementById('openLoginBtn').addEventListener('click', openLoginModal);
        document.getElementById('openLoginLink').addEventListener('click', function(e) { e.preventDefault(); openLoginModal(); });
        document.getElementById('openLoginForgot').addEventListener('click', function(e) { e.preventDefault(); openLoginModal(); });
        document.getElementById('closeLoginBtn').addEventListener('click', closeLoginModal);
        loginModal.addEventListener('click', function(e) { if (e.target === loginModal) closeLoginModal(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && loginModal.classList.contains('open')) closeLoginModal();
        });

        if (new URLSearchParams(window.location.search).get('login') === '1') openLoginModal();
        if (new URLSearchParams(window.location.search).get('banned') === 'true') {
            var msg = document.createElement('div');
            msg.style.cssText = 'background:var(--bad-color,#d86868);color:#fff;text-align:center;padding:12px 20px;font-weight:600;font-size:15px;margin-bottom:0;';
            msg.innerHTML = 'Your account has been banned. <a href="/ban/" style="color:#fff;text-decoration:underline;font-weight:700;">View details</a>';
            document.querySelector('.container-0-2-4').insertBefore(msg, document.querySelector('.container-0-2-4').firstChild);
        }

        document.getElementById('loginSubmitBtn').addEventListener('click', async function() {
            var username = loginUsername.value.trim();
            var password = loginPassword.value;
            if (!username || !password) {
                loginError.textContent = 'Please enter username and password.';
                loginError.style.display = ''; return;
            }
            loginError.style.display = 'none';
            this.disabled = true; this.textContent = 'Logging in...';
            try {
                await loginUser(username.toLowerCase() + '@corvixz.com', password);
                window.location.href = '/home/';
            } catch (e) {
                loginError.textContent = e.message || 'Invalid username or password.';
                loginError.style.display = '';
                this.disabled = false; this.textContent = 'Log In';
            }
        });

        document.getElementById('forgotPasswordLink').addEventListener('click', async function(e) {
            e.preventDefault();
            var username = loginUsername.value.trim();
            if (!username) { alert('Enter your username first.'); return; }
            try {
                await fetch(AUTH_URL + '/recover', {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: username.toLowerCase() + '@corvixz.com' })
                });
                alert('Password reset link sent to your email.');
            } catch(err) { alert('Error: ' + err.message); }
        });

        document.getElementById('signupSubmitBtn').addEventListener('click', async function() {
            var username = document.getElementById('signupUsername').value.trim();
            var password = document.getElementById('signupPassword').value;
            var confirm = document.getElementById('signupConfirmPassword').value;
            var inviteCode = document.getElementById('signupInviteKey').value.trim();
            var errorEl = document.getElementById('signupError');

            if (!username || !password || !confirm || !inviteCode) {
                errorEl.textContent = 'Please fill in all fields.'; errorEl.style.display = ''; return;
            }
            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters.'; errorEl.style.display = ''; return;
            }
            if (password !== confirm) {
                errorEl.textContent = 'Passwords do not match.'; errorEl.style.display = ''; return;
            }
            if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
                errorEl.textContent = 'Username must be 3-20 chars (letters, numbers, underscore).';
                errorEl.style.display = ''; return;
            }

            errorEl.style.display = 'none';
            this.disabled = true; this.textContent = 'Creating account...';
            try {
                await registerUser(username.toLowerCase() + '@corvixz.com', password, username, inviteCode);
                loginUsername.value = username;
                loginPassword.value = password;
                alert('Account created! You can now log in.');
                openLoginModal();
            } catch (e) {
                errorEl.textContent = e.message || 'Registration failed.';
                errorEl.style.display = '';
            } finally {
                this.disabled = false; this.textContent = 'Sign Up';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key !== 'Enter') return;
            if (loginModal.classList.contains('open')) document.getElementById('loginSubmitBtn').click();
            else document.getElementById('signupSubmitBtn').click();
        });
    })();
    </script>
</body>
</html>
