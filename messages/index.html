<!DOCTYPE html>
<html style="--primary-color: #0074BD; --primary-color-2: #0074BD; --primary-color-hover: #005a94; --secondary-color: #005a94;">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' https: data:; connect-src 'self' https://abgizefxtsrakahwzrcy.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Messages - CORVIXZ</title>
    <link rel="icon" type="image/x-icon" href="../images/logo/f.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../styles.css"/>
    <script src="../js/config.js"></script>
    <script src="../js/client.js"></script>
    <script src="../js/auth/guard.js"></script>
</head>
<body class="theme-2016">
    <div id="__next">
        <div class="page-shell">
            <div id="navbar-placeholder"></div>
            <div class="container-0-2-4">
                <div id="ad-slot"></div>
                <div class="page-wrap msg-page-wrap corvixz-white-page">
                    <div class="corvixz-white-panel msg-container">
                        <div class="vtabs-row">
                            <div class="vtabs-tab selected" data-msg-tab="inbox" onclick="switchMsgTab(this)">Inbox</div>
                            <div class="vtabs-tab" data-msg-tab="sent" onclick="switchMsgTab(this)">Sent</div>
                            <div class="vtabs-tab" data-msg-tab="notifications" onclick="switchMsgTab(this)">Notifications</div>
                            <div class="vtabs-tab" data-msg-tab="archive" onclick="switchMsgTab(this)">Archive</div>
                        </div>
                        <div class="vtabs-spacer"></div>
                        <div id="messagesList"></div>
                    </div>
                </div>
            </div>
            <div id="footer-placeholder"></div>
        </div>
    </div>

    <script src="../js/auth/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui/include.js"></script>
    <script>
    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    async function loadMessages() {
        var list = document.getElementById('messagesList');
        if (!list || !currentProfile) return;
        try {
            var msgs = await getMessages(currentProfile.id);
            if (typeof markInboxMessagesRead === 'function') {
                await markInboxMessagesRead(currentProfile.id);
                if (typeof refreshNotificationBadges === 'function') refreshNotificationBadges();
            }
            if (!msgs || msgs.length === 0) {
                list.innerHTML = '<p class="corvixz-empty">No messages.</p>';
                return;
            }
            list.innerHTML = '';
            msgs.forEach(function(m) {
                var row = document.createElement('div');
                row.className = 'msg-row';
                row.style.padding = '10px 12px';
                row.innerHTML = '<span class="msg-sender"><span>' + esc(m.sender_name || 'System') + '</span></span>'
                    + '<span class="msg-subject"><span>' + esc(m.subject || 'No subject') + '</span></span>'
                    + '<span class="msg-date">' + (m.created_at ? new Date(m.created_at).toLocaleDateString() : '') + '</span>';
                list.appendChild(row);
            });
        } catch(e) {
            list.innerHTML = '<p class="corvixz-empty">Error loading messages.</p>';
        }
    }

    function switchMsgTab(el) {
        document.querySelectorAll('.vtabs-tab').forEach(function(t) { t.classList.remove('selected'); });
        el.classList.add('selected');
        var tab = el.getAttribute('data-msg-tab');
        var list = document.getElementById('messagesList');
        if (tab === 'inbox') loadMessages();
        else if (list) list.innerHTML = '<p class="corvixz-empty">No messages in this folder.</p>';
    }
    var msgCheck = setInterval(function() { if (currentProfile) { clearInterval(msgCheck); loadMessages(); } }, 100);
    </script>
</body>
</html>
