<!DOCTYPE html>
<html style="--primary-color: #0074BD; --primary-color-2: #0074BD; --primary-color-hover: #005a94; --secondary-color: #005a94;">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' https: data:; connect-src 'self' https://abgizefxtsrakahwzrcy.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Friends - CORVIXZ</title>
    <link rel="icon" type="image/x-icon" href="../images/logo/f.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../styles.css"/>
    <script src="../js/config.js"></script>
    <script src="../js/client.js"></script>
    <script src="../js/auth/guard.js"></script>
</head>
<body class="theme-2016">
    <div id="__next">
        <div class="page-shell">
            <div id="navbar-placeholder"></div>
            <div class="container-0-2-4">
                <div id="ad-slot"></div>
                <div class="page-wrap friends-page-wrap corvixz-gray-page">
                    <h1 class="friends-page-title fw-300" id="friendsPageTitle">My Friends</h1>
                    <div class="tabs2016-bar mt-4" id="friendsTabsBar"></div>
                    <h2 class="friends-tab-heading mt-2 mb-0" id="friendsSectionLabel">FRIENDS (0)</h2>
                    <div class="row mt-2" id="friendsTabContent"></div>
                </div>
            </div>
            <div id="footer-placeholder"></div>
        </div>
    </div>

    <script src="../js/auth/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui/include.js"></script>
    <script>
    var allFriends = [];
    var pendingRequests = [];
    var currentFriendsTab = 'Friends';
    var viewedProfileId = getPathId();
    var viewedTab = getQueryParam('tab');
    var isOtherUser = false;
    var viewedUser = null;

    function escHtml(str) {
        var d = document.createElement('div');
        d.textContent = str == null ? '' : String(str);
        return d.innerHTML;
    }

    function buildDropdown(menuId, actionLabel, onAction) {
        return '<div class="dropdown2016-wrap">' +
            '<p class="dropdown2016-dots" onclick="toggleDropdown2016(\'' + menuId + '\', event)">...</p>' +
            '<div class="dropdown2016-menu" id="' + menuId + '" style="display:none;">' +
                '<div class="dropdown2016-entry" onclick="' + onAction + ';closeAllDropdowns2016();">' + actionLabel + '</div>' +
            '</div></div>';
    }

    function toggleDropdown2016(id, e) {
        if (e) { e.preventDefault(); e.stopPropagation(); }
        closeAllDropdowns2016(id);
        var menu = document.getElementById(id);
        if (menu) menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    }

    function closeAllDropdowns2016(exceptId) {
        document.querySelectorAll('.dropdown2016-menu').forEach(function(m) {
            if (!exceptId || m.id !== exceptId) m.style.display = 'none';
        });
    }

    document.addEventListener('click', function() { closeAllDropdowns2016(); });

    function renderTabsBar() {
        var bar = document.getElementById('friendsTabsBar');
        if (!bar) return;
        var tabs = isOtherUser ? ['Friends', 'Followers', 'Followings'] : ['Friend Requests', 'Friends', 'Followers', 'Followings'];
        var html = '';
        tabs.forEach(function(name) {
            var key = name;
            html += '<div class="tabs2016-tab' + (currentFriendsTab === key ? ' active' : '') + '" data-tab="' + key + '">' + name + '</div>';
        });
        bar.innerHTML = html;
        bar.querySelectorAll('.tabs2016-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                currentFriendsTab = this.getAttribute('data-tab');
                renderTabsBar();
                renderFriendsTab();
            });
        });
    }

    function renderFriendsTab() {
        var container = document.getElementById('friendsTabContent');
        var label = document.getElementById('friendsSectionLabel');
        if (!container) return;

        var data = [];
        if (currentFriendsTab === 'Friends') data = allFriends;
        else if (currentFriendsTab === 'Friend Requests') data = pendingRequests;
        else data = [];

        if (label) label.innerHTML = escHtml(currentFriendsTab.toUpperCase()) + ' <span class="ps-2">(' + data.length + ')</span>';

        if (data.length === 0 && currentFriendsTab !== 'Followers' && currentFriendsTab !== 'Followings') {
            container.innerHTML = '<div class="col-12"><p class="corvixz-empty">No ' + (currentFriendsTab === 'Friends' ? 'friends' : escHtml(currentFriendsTab.toLowerCase())) + ' to show.</p></div>';
            return;
        }

        if (currentFriendsTab === 'Followers' || currentFriendsTab === 'Followings') {
            var targetUserId = isOtherUser ? (viewedUser ? viewedUser.id : null) : currentProfile.id;
            if (!targetUserId) { container.innerHTML = '<div class="col-12"><p class="corvixz-empty">Loading...</p></div>'; return; }
            if (currentFriendsTab === 'Followers') {
                loadFollowers(targetUserId, container, label);
            } else {
                loadFollowing(targetUserId, container, label);
            }
            return;
        }

        var html = '';
        if (currentFriendsTab === 'Friend Requests') {
            data.forEach(function(f, i) {
                var p = f.sender || {};
                var profileLink = 'profile.html?id=' + (p.user_number || p.id || '');
                html += '<div class="col-12 col-md-6 col-lg-4 mb-4">';
                html += '<div class="friend-card-shadow">';
                html += '<div class="card friend-card-inner"><div class="row p-2">';
                html += '<div class="col-4"><div class="friend-card-img-wrap"><a href="' + profileLink + '"><img src="' + escHtml(p.headshot_url || 'images/avatar/headshot.png') + '" alt=""/></a></div></div>';
                html += '<div class="col-8"><p class="friend-card-name mb-0"><a href="' + profileLink + '">' + escHtml(p.username || 'Unknown') + '</a>' + (p.is_verified ? ' <img src="../images/logo/verif.png" height="14" alt="✓"/>' : '') + '</p></div>';
                html += '</div></div>';
                html += '<div class="manage-request-card"><div class="row">';
                html += '<div class="col-6 pe-0"><p class="manage-request-btn manage-request-ignore" onclick="declineReq(\'' + (f.id || '') + '\')">Ignore</p></div>';
                html += '<div class="col-6 ps-0"><p class="manage-request-btn manage-request-accept" onclick="acceptReq(\'' + (f.id || '') + '\')">Accept</p></div>';
                html += '</div></div></div></div>';
            });
        } else {
            data.forEach(function(f, i) {
                var profileLink = 'profile.html?id=' + (f.user_number || f.id || '');
                var menuId = 'friendMenu' + i;
                html += '<div class="col-12 col-md-6 col-lg-4 mb-4">';
                html += '<div class="friend-card-shadow"><div class="card friend-card-inner"><div class="row p-2">';
                html += '<div class="col-4"><div class="friend-card-img-wrap"><a href="' + profileLink + '"><img src="' + escHtml(f.headshot_url || 'images/avatar/headshot.png') + '" alt=""/></a></div></div>';
                html += '<div class="col-8">';
                html += '<div class="d-inline-block"><p class="friend-card-name mb-0"><a href="' + profileLink + '">' + escHtml(f.username || 'Unknown') + '</a>' + (f.is_verified ? ' <img src="../images/logo/verif.png" height="14" alt="✓"/>' : '') + '</p></div>';
                if (!isOtherUser) html += buildDropdown(menuId, 'Remove', 'unfriend(\'' + (f.id || '') + '\')');
                html += '</div></div></div></div></div>';
            });
        }
        container.innerHTML = html;
    }

    async function loadFollowers(targetUserId, container, label) {
        try {
            var res = await supabaseFetch(API_URL + '/follows?select=follower_id,profiles!follows_follower_id_fkey(id,user_number,username,headshot_url,is_verified)&following_id=eq.' + targetUserId, { headers: authHeaders() });
            var list = (res||[]).map(function(f) { return f.profiles; }).filter(Boolean);
            if (label) label.innerHTML = 'FOLLOWERS <span class="ps-2">(' + list.length + ')</span>';
            if (list.length === 0) { container.innerHTML = '<div class="col-12"><p class="corvixz-empty">No followers to show.</p></div>'; return; }
            var html = '';
            list.forEach(function(f) {
                var profileLink = 'profile.html?id=' + (f.user_number || f.id || '');
                html += '<div class="col-12 col-md-6 col-lg-4 mb-4">';
                html += '<div class="friend-card-shadow"><div class="card friend-card-inner"><div class="row p-2">';
                html += '<div class="col-4"><div class="friend-card-img-wrap"><a href="' + profileLink + '"><img src="' + escHtml(f.headshot_url || 'images/avatar/headshot.png') + '" alt=""/></a></div></div>';
                html += '<div class="col-8">';
                html += '<p class="friend-card-name mb-0"><a href="' + profileLink + '">' + escHtml(f.username || 'Unknown') + '</a>' + (f.is_verified ? ' <img src="../images/logo/verif.png" height="14" alt="✓"/>' : '') + '</p>';
                html += '</div></div></div></div></div>';
            });
            container.innerHTML = html;
        } catch(e) { container.innerHTML = '<div class="col-12"><p class="corvixz-empty">Error loading followers.</p></div>'; }
    }

    async function loadFollowing(targetUserId, container, label) {
        try {
            var res = await supabaseFetch(API_URL + '/follows?select=following_id,profiles!follows_following_id_fkey(id,user_number,username,headshot_url,is_verified)&follower_id=eq.' + targetUserId, { headers: authHeaders() });
            var list = (res||[]).map(function(f) { return f.profiles; }).filter(Boolean);
            if (label) label.innerHTML = 'FOLLOWING <span class="ps-2">(' + list.length + ')</span>';
            if (list.length === 0) { container.innerHTML = '<div class="col-12"><p class="corvixz-empty">No following to show.</p></div>'; return; }
            var html = '';
            list.forEach(function(f) {
                var profileLink = 'profile.html?id=' + (f.user_number || f.id || '');
                html += '<div class="col-12 col-md-6 col-lg-4 mb-4">';
                html += '<div class="friend-card-shadow"><div class="card friend-card-inner"><div class="row p-2">';
                html += '<div class="col-4"><div class="friend-card-img-wrap"><a href="' + profileLink + '"><img src="' + escHtml(f.headshot_url || 'images/avatar/headshot.png') + '" alt=""/></a></div></div>';
                html += '<div class="col-8">';
                html += '<p class="friend-card-name mb-0"><a href="' + profileLink + '">' + escHtml(f.username || 'Unknown') + '</a>' + (f.is_verified ? ' <img src="../images/logo/verif.png" height="14" alt="✓"/>' : '') + '</p>';
                html += '</div></div></div></div></div>';
            });
            container.innerHTML = html;
        } catch(e) { container.innerHTML = '<div class="col-12"><p class="corvixz-empty">Error loading following.</p></div>'; }
    }

    async function loadFriendsPage() {
        if (!currentProfile) return;
        if (viewedProfileId && parseInt(viewedProfileId) !== parseInt(currentProfile.user_number)) {
            isOtherUser = true;
            try {
                var profileRes = await supabaseFetch(API_URL + '/profiles?select=id,user_number,username&user_number=eq.' + parseInt(viewedProfileId) + '&limit=1', { headers: authHeaders() });
                if (profileRes && profileRes[0]) {
                    viewedUser = profileRes[0];
                    document.getElementById('friendsPageTitle').textContent = escHtml(viewedUser.username) + '\'s Friends';
                }
                allFriends = await getFriends(viewedUser ? viewedUser.id : viewedProfileId);
                currentFriendsTab = viewedTab && ['Friends','Followers','Followings'].indexOf(viewedTab) >= 0 ? viewedTab : 'Friends';
            } catch(e) { console.error('Friends load error:', e); }
        } else {
            try {
                allFriends = await getFriends(currentProfile.id);
                pendingRequests = (await getFriendRequests(currentProfile.id)) || [];
                if (pendingRequests.length > 0 && !viewedTab) currentFriendsTab = 'Friend Requests';
                else if (viewedTab && ['Friends','Followers','Followings'].indexOf(viewedTab) >= 0) currentFriendsTab = viewedTab;
            } catch(e) { console.error('Friends load error:', e); }
        }
        renderTabsBar();
        renderFriendsTab();
        if (typeof updateDynamicElements === 'function') updateDynamicElements();
        if (typeof refreshNotificationBadges === 'function') refreshNotificationBadges();
    }

    async function acceptReq(reqId) {
        try { await acceptFriendRequest(reqId); loadFriendsPage(); }
        catch(e) { alert('Error: ' + e.message); }
    }

    async function declineReq(reqId) {
        try { await declineFriendRequest(reqId); loadFriendsPage(); }
        catch(e) { alert('Error: ' + e.message); }
    }

    async function unfriend(friendId) {
        if (!confirm('Remove this friend?')) return;
        try { await removeFriend(currentProfile.id, friendId); loadFriendsPage(); }
        catch(e) { alert('Error: ' + e.message); }
    }

    var check = setInterval(function() { if (currentProfile) { clearInterval(check); loadFriendsPage(); } }, 100);
    </script>
</body>
</html>
