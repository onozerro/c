<!DOCTYPE html>
<html style="--primary-color: #0074BD; --primary-color-2: #0074BD; --primary-color-hover: #005a94; --secondary-color: #005a94;">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' https: data:; connect-src 'self' https://abgizefxtsrakahwzrcy.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Configure Game - CORVIXZ</title>
    <link rel="icon" type="image/x-icon" href="../images/logo/f.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../styles.css"/>
    <script src="../js/config.js"></script>
    <script src="../js/client.js"></script>
    <script src="../js/auth/guard.js"></script>
</head>
<body class="theme-2016">
    <div id="__next">
        <div class="page-shell">
            <div id="navbar-placeholder"></div>
            <div class="container-0-2-4">
                <div id="ad-slot"></div>
                <div class="page-wrap">
                    <div class="card-2016 configure-place-card">
                        <div class="row">
                            <div class="col-12"><h2 class="configure-place-title">Configure Place</h2></div>
                        </div>
                        <div class="row configure-place-body">
                            <div class="col-2">
                                <div class="dev-vertical-selector" id="configureTabs">
                                    <a href="#" class="dev-selector-option selected" data-tab="basic">Basic Settings</a>
                                    <a href="#" class="dev-selector-option" data-tab="icon">Game Icon</a>
                                    <a href="#" class="dev-selector-option disabled">Upload</a>
                                    <a href="#" class="dev-selector-option disabled">Thumbnails</a>
                                    <a href="#" class="dev-selector-option disabled">Access</a>
                                    <a href="#" class="dev-selector-option disabled">Permissions</a>
                                </div>
                            </div>
                            <div class="col-10">
                                <div id="tab-basic" class="configure-tab active">
                                    <h2 class="fw-bolder mb-4 configure-tab-heading">Basic Settings</h2>
                                    <p id="cfgError" class="text-danger" style="display:none;"></p>
                                    <div class="configure-form-col">
                                        <p class="mb-0 fw-bold">Name:</p>
                                        <input type="text" id="cfgName" class="form-control w-100"/>
                                        <p class="mb-0 fw-bold mt-2">Description:</p>
                                        <textarea id="cfgDesc" class="form-control w-100" rows="8"></textarea>
                                        <p class="mb-0 fw-bold mt-2">Genre:</p>
                                        <select id="cfgGenre" class="form-control w-100">
                                            <option value="">All</option>
                                            <option>Adventure</option><option>Fighting</option><option>FPS</option>
                                            <option>Horror</option><option>RPG</option><option>Tycoon</option>
                                        </select>
                                        <p class="mb-0 fw-bold mt-2">Max Players:</p>
                                        <input type="number" id="cfgMaxPlayers" class="form-control w-100" value="99"/>
                                        <p class="mb-0 fw-bold mt-2">Allowed Gear:</p>
                                        <input type="text" id="cfgGear" class="form-control w-100" value="None"/>
                                        <p class="mb-0 fw-bold mt-2">Comments Enabled:</p>
                                        <select id="cfgComments" class="form-control w-100">
                                            <option value="true">Yes</option>
                                            <option value="false">No</option>
                                        </select>
                                        <div class="mt-4 configure-btn-row">
                                            <button type="button" class="continueButton-0-2-26" id="cfgSaveBtn" onclick="saveConfigureGame()">Save</button>
                                            <button type="button" class="cancelButton-0-2-27" onclick="window.location.href='develop.html?View=0'">Cancel</button>
                                        </div>
                                    </div>
                                </div>
                                <div id="tab-icon" class="configure-tab">
                                    <h2 class="fw-bolder mb-4 configure-tab-heading">Game Icon</h2>
                                    <div class="configure-form-col">
                                        <p class="mb-0 fw-bold">Thumbnail (256×256):</p>
                                        <input type="file" id="cfgThumb" accept="image/*" class="form-control"/>
                                        <p class="mb-0 fw-bold mt-2">Thumbnail Big (768×432):</p>
                                        <input type="file" id="cfgThumbBig" accept="image/*" class="form-control"/>
                                        <div class="mt-3" id="cfgIconPreview"></div>
                                        <div class="mt-4 configure-btn-row">
                                            <button type="button" class="continueButton-0-2-26" onclick="saveConfigureIcons()">Save</button>
                                            <button type="button" class="cancelButton-0-2-27" onclick="showConfigureTab('basic')">Cancel</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="footer-placeholder"></div>
        </div>
    </div>
    <script src="../js/auth/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui/include.js"></script>
    <script>
    function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }

    var cfgGameId = null;
    var cfgIsNew = false;

    function showConfigureTab(tab) {
        document.querySelectorAll('#configureTabs .dev-selector-option:not(.disabled)').forEach(function(a) {
            a.classList.toggle('selected', a.getAttribute('data-tab') === tab);
        });
        document.querySelectorAll('.configure-tab').forEach(function(t) { t.classList.remove('active'); });
        document.getElementById('tab-' + tab).classList.add('active');
    }
    document.querySelectorAll('#configureTabs .dev-selector-option:not(.disabled)').forEach(function(a) {
        a.addEventListener('click', function(e) {
            e.preventDefault();
            showConfigureTab(this.getAttribute('data-tab'));
        });
    });

    async function loadConfigureGame() {
        var p = new URLSearchParams(window.location.search);
        cfgIsNew = p.get('new') === '1';
        cfgGameId = p.get('id');
        if (cfgIsNew) {
            document.querySelector('.configure-place-title').textContent = 'Configure Place — New Game';
            return;
        }
        if (!cfgGameId) { window.location.href = 'develop.html?View=0'; return; }
        var g = await getGame(cfgGameId);
        if (!g || g.creator_id !== currentProfile.id) { window.location.href = 'develop.html?View=0'; return; }
        document.getElementById('cfgName').value = g.title || '';
        document.getElementById('cfgDesc').value = g.description || '';
        document.getElementById('cfgGenre').value = g.genre || '';
        document.getElementById('cfgMaxPlayers').value = g.max_players || 99;
        document.getElementById('cfgGear').value = g.allowed_gear || 'None';
        document.getElementById('cfgComments').value = g.comments_enabled === false ? 'false' : 'true';
        var prev = document.getElementById('cfgIconPreview');
        if (g.thumbnail) prev.innerHTML = '<img src="' + esc(g.thumbnail) + '" height="128" style="object-fit:cover;border:1px solid #ccc;"/>';
    }

    async function saveConfigureGame() {
        var err = document.getElementById('cfgError');
        err.style.display = 'none';
        var data = {
            title: document.getElementById('cfgName').value.trim(),
            description: document.getElementById('cfgDesc').value.trim(),
            genre: document.getElementById('cfgGenre').value,
            max_players: parseInt(document.getElementById('cfgMaxPlayers').value, 10) || 99,
            allowed_gear: document.getElementById('cfgGear').value.trim() || 'None',
            comments_enabled: document.getElementById('cfgComments').value === 'true',
            updated_at: new Date().toISOString()
        };
        if (!data.title) { err.textContent = 'Name is required.'; err.style.display = 'block'; return; }
        try {
            if (cfgIsNew) {
                data.creator_id = currentProfile.id;
                data.year = '2017';
                await createGame(data);
                var games = await getGames();
                var mine = (games || []).filter(function(g) { return g.creator_id === currentProfile.id; });
                mine.sort(function(a,b) { return new Date(b.created_at) - new Date(a.created_at); });
                if (mine[0]) window.location.href = 'configure-game.html?id=' + mine[0].id;
                else window.location.href = 'develop.html?View=0';
            } else {
                await updateGame(cfgGameId, data);
                window.location.href = 'develop.html?View=0';
            }
        } catch(e) { err.textContent = e.message; err.style.display = 'block'; }
    }

    async function saveConfigureIcons() {
        if (cfgIsNew || !cfgGameId) return;
        var data = { updated_at: new Date().toISOString() };
        var t = document.getElementById('cfgThumb').files[0];
        var tb = document.getElementById('cfgThumbBig').files[0];
        if (t) data.thumbnail = await uploadGameThumbnail(t);
        if (tb) data.thumbnail_big = await uploadGameThumbnail(tb);
        if (!t && !tb) return;
        await updateGame(cfgGameId, data);
        loadConfigureGame();
    }

    var cfgCheck = setInterval(function() {
        if (currentProfile) { clearInterval(cfgCheck); loadConfigureGame(); }
    }, 100);
    </script>
</body>
</html>
