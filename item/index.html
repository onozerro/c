<!DOCTYPE html>
<html style="--primary-color: #0074BD; --primary-color-2: #0074BD; --primary-color-hover: #005a94; --secondary-color: #005a94;">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' https: data:; connect-src 'self' https://abgizefxtsrakahwzrcy.supabase.co; base-uri 'self'; object-src 'none'; form-action 'self'"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Item - CORVIXZ</title>
    <link rel="icon" type="image/x-icon" href="../images/logo/f.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../styles.css"/>
    <script src="../js/config.js"></script>
    <script src="../js/client.js"></script>
    <script src="../js/auth/guard.js"></script>
</head>
<body class="theme-2016">
    <div id="__next">
        <div class="page-shell">
            <div id="navbar-placeholder"></div>
            <div class="container-0-2-4">
                <div id="ad-slot"></div>
                <div class="page-wrap catalog-page-wrap corvixz-white-page">
                    <div class="item-page-card" id="itemContent">
                        <div class="loading-item" id="itemLoading">Loading item...</div>
                    </div>
                </div>
            </div>
            <div id="footer-placeholder"></div>
        </div>
    </div>

    <div class="buy-modal-overlay" id="buyModal" style="display:none;">
        <div class="buy-modal-panel">
            <h3 class="buy-modal-title">Buy Item</h3>
            <div class="buy-modal-body">
                <div class="row">
                    <div class="col-3 text-center">
                        <img id="buyModalImg" src="" alt="" class="buy-modal-img"/>
                    </div>
                    <div class="col-9">
                        <p class="buy-modal-desc" id="buyModalDesc"></p>
                        <p class="buy-modal-balance" id="buyModalBalance"></p>
                    </div>
                </div>
            </div>
            <div class="buy-modal-footer">
                <button class="buy-modal-btn-cancel" onclick="closeBuyModal()">Cancel</button>
                <button class="buy-modal-btn-confirm" id="buyModalConfirmBtn" onclick="confirmPurchase()">Buy Now</button>
            </div>
        </div>
    </div>

    <script src="../js/auth/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui/include.js"></script>
    <script src="../js/ui/comments-ui.js"></script>
    <script>
    var itemData = null;
    var itemOwned = false;

    function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function getItemCreator(item) {
        if (item.creator && (item.creator.username || item.creator.display_name)) return item.creator;
        return null;
    }

    function openBuyModal() {
        if (!currentProfile) return;
        var price = itemData.price || 0;
        var isFree = price === 0;
        var creator = getItemCreator(itemData);
        var sellerName = creator ? (creator.display_name || creator.username) : 'Unknown';
        var itemImage = itemData.image_url || 'images/avatar/headshot.png';
        var priceText = isFree ? 'FREE' : robuxHtml(price, 12);

        var img = document.getElementById('buyModalImg');
        img.src = itemImage;
        img.alt = esc(itemData.name);

        var desc = document.getElementById('buyModalDesc');
        desc.innerHTML = 'Would you like to <strong>' + (isFree ? 'take' : 'buy') + '</strong> the <strong>' + esc(itemData.name) + '</strong> from <strong>' + esc(sellerName) + '</strong> for <strong>' + (isFree ? 'FREE' : priceText) + '</strong>?';

        var balanceEl = document.getElementById('buyModalBalance');
        if (isFree) {
            balanceEl.textContent = '';
        } else {
            balanceEl.innerHTML = 'Your balance after this transaction will be <strong>' + robuxHtml((currentProfile.currency || 0) - price, 12) + '</strong> ro-coin.';
        }

        var confirmBtn = document.getElementById('buyModalConfirmBtn');
        confirmBtn.textContent = isFree ? 'Take' : 'Buy Now';
        confirmBtn.disabled = false;

        document.getElementById('buyModal').style.display = 'flex';
    }

    function closeBuyModal() {
        document.getElementById('buyModal').style.display = 'none';
    }

    async function confirmPurchase() {
        var btn = document.getElementById('buyModalConfirmBtn');
        var price = itemData.price || 0;
        var isFree = price === 0;
        btn.disabled = true;
        btn.textContent = isFree ? 'Taking...' : 'Buying...';
        try {
            await buyItem(itemData.id);
            closeBuyModal();
            itemOwned = true;
            renderOwnedPanel();
        } catch(e) {
            var msg = (e && e.message) || 'Unknown error';
            if (/already own/i.test(msg)) {
                itemOwned = true;
                renderOwnedPanel();
            } else {
                alert('Purchase failed: ' + msg);
            }
            btn.disabled = false;
            btn.textContent = isFree ? 'Take' : 'Buy Now';
        }
    }

    async function initItem() {
        var params = new URLSearchParams(window.location.search);
        var rawId = params.get('id');
        if (!rawId) {
            document.getElementById('itemLoading').textContent = 'No item specified.';
            return;
        }
        try {
            if (/^\d+$/.test(rawId)) {
                var items = await supabaseFetch(API_URL + '/items?select=' + ITEM_CREATOR_SELECT + '&item_number=eq.' + rawId + '&limit=1', { headers: authHeaders() });
                itemData = items && items[0] ? items[0] : null;
            } else {
                itemData = await getItem(rawId);
            }
            if (!itemData) {
                document.getElementById('itemLoading').textContent = 'Item not found.';
                return;
            }
            renderItem(itemData);
        } catch(e) {
            document.getElementById('itemLoading').textContent = 'Error loading item.';
        }
    }

    function renderItem(item) {
        document.title = item.name + ' - CORVIXZ';
        var subTitle = 'CORVIXZ ' + (item.item_type || 'Item');
        var limitedOverlay = '';
        if (item.is_limited_unique) {
            limitedOverlay = '<img src="../images/icons/limitedUOverlay_small.png" alt="Limited Unique" style="position:absolute;bottom:0;left:0;width:120px;height:auto;object-fit:contain;pointer-events:none;z-index:2;"/>';
        } else if (item.is_limited) {
            limitedOverlay = '<img src="../images/icons/limitedOverlay_small.png" alt="Limited" style="position:absolute;bottom:0;left:0;width:120px;height:auto;object-fit:contain;pointer-events:none;z-index:2;"/>';
        }
        var imageHtml = item.image_url
            ? '<div style="position:relative;">' + limitedOverlay + '<img src="' + esc(item.image_url) + '" alt="' + esc(item.name) + '" style="display:block;width:100%;"/></div>'
            : '<div style="position:relative;display:flex;align-items:center;justify-content:center;min-height:200px;background:#f5f5f5;">' + limitedOverlay + '<span style="opacity:0.35;font-size:14px;">No Image</span></div>';
        var creator = getItemCreator(item);
        var creatorName = creator ? (creator.display_name || creator.username) : 'Unknown';
        var creatorLink = creator ? 'profile.html?id=' + (creator.user_number || creator.id) : '#';
        var creatorHead = creator ? (creator.avatar_url || creator.headshot_url || 'images/avatar/headshot.png') : 'images/avatar/headshot.png';
        var createdDate = item.created_at ? new Date(item.created_at).toLocaleDateString('en-US') : 'N/A';
        var updatedText = item.updated_at ? new Date(item.updated_at).toLocaleDateString('en-US') : createdDate;
        var price = item.price || 0;
        var isFree = price === 0;

        var html = '<div class="row mt-4 item-corvixz-page">';
        html += '<div class="col-12">';
        html += '<div class="row item-corvixz-title-row">';
        html += '<div class="col-10 col-md-10">';
        html += '<h1 class="item-name">' + esc(item.name) + '</h1>';
        html += '<h3 class="item-subtitle">' + esc(subTitle) + '</h3>';
        html += '</div>';
        html += '<div class="col-2 col-md-2"></div>';
        html += '</div>';
        html += '<div class="row mt-2 item-corvixz-body-row">';
        html += '<div class="col-12 col-md-5 col-lg-5"><div class="item-image-box">' + imageHtml + '</div></div>';
        html += '<div class="col-12 col-md-4 col-lg-4">';
        html += '<div class="row item-creator-corvixz mb-2 mx-0">';
        html += '<div class="col-4 ps-0 pe-0"><a href="' + creatorLink + '"><img class="item-creator-headshot" src="' + esc(creatorHead) + '" alt=""/></a></div>';
        html += '<div class="col-8 ps-2 pe-0">';
        html += '<p class="item-stat-line mb-0"><span class="item-stat-label">Creator:</span> <a href="' + creatorLink + '">' + esc(creatorName) + '</a></p>';
        html += '<p class="item-stat-line mb-0"><span class="item-stat-label">Created:</span> ' + esc(createdDate) + '</p>';
        html += '<p class="item-stat-line mb-0"><span class="item-stat-label">Updated:</span> ' + esc(updatedText) + '</p>';
        html += '</div></div>';
        html += '<p class="item-desc">' + esc(item.description || 'No description available.') + '</p>';
        html += '<a href="#" class="item-report-link" onclick="return false;">Report Abuse</a>';
        html += '<div class="divider-top mt-2"></div>';
        html += '<p class="item-genre-label mb-0">Genres:</p><p class="item-genre">All</p>';
        html += '</div>';
        html += '<div class="col-12 col-md-3 col-lg-3">';
        html += '<div class="item-buy-panel-corvixz">';
        html += '<div class="mt-2"></div>';
        html += '<p class="item-price-line mb-1 text-center">Price: ' + robuxHtml(isFree ? 'FREE' : price, 12) + '</p>';
        if (item.is_limited && !item.is_limited_unique) {
            html += '<p class="text-center mb-1" style="font-size:13px;color:#d9534f;font-weight:600;">LIMITED</p>';
        }
        if (item.is_limited_unique) {
            html += '<p class="text-center mb-1" style="font-size:13px;color:#d9534f;font-weight:600;">LIMITED UNIQUE</p>';
            var rem = item.remaining_count || 0;
            html += '<p class="text-center mb-1" style="font-size:12px;color:#666;">' + rem + ' / ' + (item.serial_count || 0) + ' remaining</p>';
        }
        html += '<div id="itemBuyCol"><button class="corvixz-play-btn buyButton-0-2-24 w-100" id="itemBuyBtn" onclick="showBuyModal()" style="display:none;">Buy with R&#36;</button></div>';
        html += '<p class="item-sale-count">( <span class="text-black">' + (item.sales || 0) + '</span> Sold)</p>';
        html += '</div>';
        html += '<div class="item-favorite-row"><span class="corvixz-favorite-star"></span> 0 <a href="#" onclick="return false;">Favorite</a></div>';
        html += '</div></div>';
        html += '<div class="item-vtabs-wrap mt-4">';
        html += '<div class="vtabs-row item-vtabs">';
        html += '<div class="vtabs-tab selected" data-item-tab="rec" onclick="switchItemTab(this)">Recommendations</div>';
        html += '<div class="vtabs-tab" data-item-tab="com" onclick="switchItemTab(this)">Commentary</div>';
        html += '<div class="vtabs-tab" data-item-tab="own" onclick="switchItemTab(this)">Owners</div>';
        html += '</div><div class="vtabs-spacer"></div>';
        html += '<div class="item-tab-panel" id="itemTabRec"><p class="corvixz-empty">No recommendations.</p></div>';
        html += '<div class="item-tab-panel" id="itemTabCom" style="display:none;"><div id="itemCommentsPanel"></div></div>';
        html += '<div class="item-tab-panel" id="itemTabOwn" style="display:none;"><p class="corvixz-empty">No owners listed.</p></div>';
        html += '</div></div></div>';

        document.getElementById('itemContent').innerHTML = html;

        function refreshOwned() {
            if (!currentProfile) return;
            supabaseFetch(API_URL + '/inventory?select=id&user_id=eq.' + currentProfile.id + '&item_id=eq.' + item.id + '&limit=1', { headers: authHeaders() })
                .then(function(rows) {
                    var entry = rows && rows[0];
                    itemOwned = !!entry;
                    renderOwnedPanel();
                })
                .catch(function() {
                    if (!itemOwned) {
                        var buyCol = document.getElementById('itemBuyCol');
                        if (buyCol && !document.getElementById('itemBuyBtn')) renderOwnedPanel();
                    }
                });
        }

        var checkOwned = setInterval(function() {
            if (!currentProfile) return;
            clearInterval(checkOwned);
            refreshOwned();
            if (typeof updateDynamicElements === 'function') updateDynamicElements();
        }, 100);
        setTimeout(function() {
            if (!itemOwned && !document.getElementById('itemBuyBtn')) renderOwnedPanel();
        }, 3000);
    }

    function renderOwnedPanel() {
        var buyCol = document.getElementById('itemBuyCol');
        if (!buyCol) return;
        var rem = itemData.remaining_count || 0;
        var offCatalog = (itemData.is_limited_unique && rem <= 0);
        if (itemOwned) {
            buyCol.innerHTML = '<button class="corvixz-group-btn w-100" disabled style="opacity:0.7;cursor:default;">Owned</button>';
            return;
        }
        if (offCatalog) {
            buyCol.innerHTML = '<p class="mb-0 text-center text-dark" style="font-size:13px;">offsale</p>';
        } else {
            buyCol.innerHTML = '<button class="corvixz-play-btn buyButton-0-2-24 w-100" id="itemBuyBtn" onclick="showBuyModal()">Buy with R&#36;</button>';
        }
    }

    function showBuyModal() {
        if (!currentProfile) return;
        if (itemData.is_limited_unique && itemData.remaining_count <= 0) {
            alert('This item is sold out.');
            return;
        }
        openBuyModal();
    }

    function switchItemTab(el) {
        document.querySelectorAll('.item-vtabs .vtabs-tab').forEach(function(t) { t.classList.remove('selected'); });
        el.classList.add('selected');
        var tab = el.getAttribute('data-item-tab');
        document.getElementById('itemTabRec').style.display = tab === 'rec' ? '' : 'none';
        document.getElementById('itemTabCom').style.display = tab === 'com' ? '' : 'none';
        document.getElementById('itemTabOwn').style.display = tab === 'own' ? '' : 'none';
        if (tab === 'com' && itemData && typeof CommentsUI !== 'undefined') {
            CommentsUI.mount('itemCommentsPanel', 'item', itemData.id, itemData.comments_enabled !== false);
        }
    }

    initItem();
    </script>
</body>
</html>
