<!DOCTYPE html>
<html style="--primary-color: #0074BD; --primary-color-2: #0074BD; --primary-color-hover: #005a94; --secondary-color: #005a94;">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' https: data:; connect-src 'self' https://abgizefxtsrakahwzrcy.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Forum - CORVIXZ</title>
    <link rel="icon" type="image/x-icon" href="../images/logo/f.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../styles.css"/>
    <script src="../js/config.js"></script>
    <script src="../js/client.js"></script>
    <script src="../js/auth/guard.js"></script>
</head>
<body class="theme-2016">
    <div id="__next">
        <div class="page-shell">
            <div id="navbar-placeholder"></div>
            <div class="container-0-2-4">
                <div id="ad-slot"></div>
                <div class="page-wrap forum-page-wrap corvixz-white-page">
                    <div class="corvixz-white-panel forum-wrap">
                        <div class="forum-header-bar">
                            <p class="mb-0"><span class="fw-600">Current time: </span><span id="forumTime"></span></p>
                        </div>
                        <div id="forumCategories"></div>
                    </div>
                </div>
            </div>
            <div id="footer-placeholder"></div>
        </div>
    </div>

    <script src="../js/auth/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui/include.js"></script>
    <script>
    function esc(s) { var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

    function updateForumTime() {
        var el = document.getElementById('forumTime');
        if (el) el.textContent = new Date().toLocaleString('en-US', { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    async function loadForumHome() {
        updateForumTime();
        setInterval(updateForumTime, 60000);
        var container = document.getElementById('forumCategories');
        try {
            var cats = await getForumCategories();
            if (!cats || !cats.length) {
                container.innerHTML = '<p class="corvixz-empty">Forum not configured. Run supabase-groups-forums-trades.sql</p>';
                return;
            }
            var html = '';
            for (var i = 0; i < cats.length; i++) {
                var cat = cats[i];
                html += '<table class="forum-table w-100"><thead><tr>';
                html += '<th style="width:55%;">' + esc(cat.name) + '</th>';
                html += '<th style="width:15%;" class="text-center">Threads</th>';
                html += '<th style="width:15%;" class="text-center">Posts</th>';
                html += '<th style="width:15%;" class="text-center">Last Post</th></tr></thead><tbody>';
                var subs = cat.forum_subcategories || [];
                for (var j = 0; j < subs.length; j++) {
                    var sub = subs[j];
                    var stats = await getForumStats(sub.id);
                    html += '<tr class="forum-body-row">';
                    html += '<td><a href="/forum/view/?sub="' + sub.id + '" class="forum-sub-link">';
                    html += '<p class="mb-0 fw-bold mt-2">' + esc(sub.name) + '</p>';
                    html += '<p class="mb-2">' + esc(sub.description) + '</p></a></td>';
                    html += '<td class="text-center">' + stats.threadCount + '</td>';
                    html += '<td class="text-center">' + stats.postCount + '</td>';
                    html += '<td class="text-center">';
                    if (stats.lastPost) {
                        html += '<p class="fw-bold mb-0">' + new Date(stats.lastPost.created_at).toLocaleDateString() + '</p>';
                        html += '<p class="mb-0">' + esc(stats.lastPost.author && stats.lastPost.author.username || '') + '</p>';
                    }
                    html += '</td></tr>';
                }
                html += '</tbody></table>';
            }
            container.innerHTML = html;
        } catch(e) {
            container.innerHTML = '<p class="corvixz-empty">Error loading forum.</p>';
        }
    }

    loadForumHome();
    </script>
</body>
</html>
