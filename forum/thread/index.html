<!DOCTYPE html>
<html style="--primary-color: #0074BD; --primary-color-2: #0074BD; --primary-color-hover: #005a94; --secondary-color: #005a94;">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' https: data:; connect-src 'self' https://abgizefxtsrakahwzrcy.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Thread - CORVIXZ Forum</title>
    <link rel="icon" type="image/x-icon" href="../../images/logo/f.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../../styles.css"/>
    <script src="../../js/config.js"></script>
    <script src="../../js/client.js"></script>
    <script src="../../js/auth/guard.js"></script>
</head>
<body class="theme-2016">
    <div id="__next">
        <div class="page-shell">
            <div id="navbar-placeholder"></div>
            <div class="container-0-2-4">
                <div id="ad-slot"></div>
                <div class="page-wrap forum-page-wrap corvixz-white-page">
                    <div class="corvixz-white-panel forum-wrap">
                        <div class="forum-view-header">
                            <a href="#" id="forumBackLink">&laquo; Back</a>
                            <h1 class="forum-view-title" id="threadTitle">Thread</h1>
                        </div>
                        <div id="forumPostsList" class="mt-3"></div>
                        <div class="forum-reply-box mt-4" id="forumReplyBox" style="display:none;">
                            <h3 class="dev-subtitle">Post Reply</h3>
                            <textarea id="replyBody" class="form-control mb-2" rows="4"></textarea>
                            <button type="button" class="newContinueButton-0-2-31" onclick="submitReply()">Post Reply</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="footer-placeholder"></div>
        </div>
    </div>

    <script src="../../js/auth/auth.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/ui/include.js"></script>
    <script>
    var threadId = null;
    function esc(s) { var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

    async function loadThread() {
        threadId = parseInt(new URLSearchParams(window.location.search).get('id'), 10);
        if (!threadId) { window.location.href = 'forum.html'; return; }
        var thread = await getForumThread(threadId);
        if (!thread) { document.getElementById('forumPostsList').innerHTML = '<p class="corvixz-empty">Thread not found.</p>'; return; }
        document.title = thread.title + ' - CORVIXZ Forum';
        document.getElementById('threadTitle').textContent = thread.title;
        if (thread.subcategory_id) {
            document.getElementById('forumBackLink').href = 'forum-view.html?sub=' + thread.subcategory_id;
        }
        var posts = await getForumPosts(threadId);
        var html = '';
        (posts || []).forEach(function(p) {
            html += '<div class="forum-post-card card-2016">';
            html += '<div class="row">';
            html += '<div class="col-2 text-center"><img src="' + esc(p.author && (p.author.avatar_url || p.author.headshot_url) || 'images/avatar/headshot.png') + '" class="forum-post-avatar" alt=""/>';
            html += '<p class="mb-0 font-size-12 mt-1"><a href="/profile/' + (p.author && p.author.user_number || '') + '">' + esc(p.author && p.author.username || 'Unknown') + '</a></p></div>';
            html += '<div class="col-10"><p class="forum-post-body">' + esc(p.body).replace(/\n/g, '<br>') + '</p>';
            html += '<p class="mb-0 font-size-12 text-muted">' + new Date(p.created_at).toLocaleString() + '</p></div>';
            html += '</div></div>';
        });
        document.getElementById('forumPostsList').innerHTML = html || '<p class="corvixz-empty">No posts.</p>';
    }

    async function submitReply() {
        if (!currentProfile) { alert('Login required.'); return; }
        var body = document.getElementById('replyBody').value.trim();
        if (!body) return;
        try {
            await createForumPost(threadId, body);
            document.getElementById('replyBody').value = '';
            loadThread();
        } catch(e) { alert('Error: ' + (e.message || 'Failed')); }
    }

    var check = setInterval(function() {
        if (typeof getForumThread === 'function') {
            clearInterval(check);
            loadThread();
            var replyCheck = setInterval(function() {
                if (currentProfile) {
                    clearInterval(replyCheck);
                    document.getElementById('forumReplyBox').style.display = '';
                }
            }, 100);
        }
    }, 50);
    </script>
</body>
</html>
