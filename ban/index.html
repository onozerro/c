<!DOCTYPE html>
<html style="--primary-color: #0074BD; --primary-color-2: #0074BD; --primary-color-hover: #005a94; --secondary-color: #005a94;">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' https: data:; connect-src 'self' https://abgizefxtsrakahwzrcy.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Account Banned - CORVIXZ</title>
    <link rel="icon" type="image/x-icon" href="../images/logo/f.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../styles.css"/>
    <script src="../js/config.js"></script>
    <script src="../js/client.js"></script>
    <style>
        body { margin: 0; padding: 0; background: var(--background-color); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .ban-card { background: #fff; box-shadow: 0 1px 4px rgba(25,25,25,0.3); padding: 48px; max-width: 500px; width: 100%; margin: 20px; text-align: center; }
        .ban-card .reason { font-size: 18px; font-weight: 600; color: var(--text-color-primary); margin: 12px 0 4px; }
        .ban-card .detail { font-size: 14px; color: var(--text-color-tertiary); margin: 2px 0; }
        .ban-card .contact { font-size: 14px; color: var(--text-color-tertiary); margin: 16px 0 0; }
    </style>
</head>
<body class="theme-2016">
    <div class="ban-card">
        <div style="color:#4a4a4a;font-size:24px;font-weight:500;margin:0 0 12px;line-height:1.2;">Account Banned</div>
        <div id="banReason" class="reason"></div>
        <div id="banDate" class="detail"></div>
        <div id="banBy" class="detail"></div>
        <p class="contact">If you believe this was a mistake, please contact support.</p>
        <a id="banLogoutBtn" class="newContinueButton-0-2-31" href="#" onclick="event.preventDefault();logoutUser();" style="text-decoration:none !important;margin-top:20px;">Log Out</a>
    </div>
    <script>
        var banData = null;
        try { banData = JSON.parse(sessionStorage.getItem('banData')); } catch(e) {}
        if (!banData) { window.location.href = 'index.html'; }
        else {
            document.getElementById('banReason').textContent = banData.reason || 'No reason provided.';
            if (banData.date) {
                var d = new Date(banData.date);
                document.getElementById('banDate').textContent = 'Date: ' + d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
            }
            if (banData.by) document.getElementById('banBy').textContent = 'Banned by: ' + banData.by;
        }
    </script>
    <script src="../js/auth/auth.js"></script>
    <script src="../js/api.js"></script>
</body>
</html>
