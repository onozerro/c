<!DOCTYPE html>
<html style="--primary-color: #0074BD; --primary-color-2: #0074BD; --primary-color-hover: #005a94; --secondary-color: #005a94;">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' https: data:; connect-src 'self' https://abgizefxtsrakahwzrcy.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Settings - CORVIXZ</title>
    <link rel="icon" type="image/x-icon" href="../images/logo/f.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../styles.css"/>
    <script src="../js/config.js"></script>
    <script src="../js/client.js"></script>
    <script src="../js/auth/guard.js"></script>
</head>
<body class="theme-2016">
    <div id="__next">
        <div class="page-shell">
            <div id="navbar-placeholder"></div>
            <div class="container-0-2-4">
                <div class="page-wrap settings-page corvixz-gray-page">
                    <h1>My Settings</h1>
                    <div class="tabs2016-bar">
                        <div class="tabs2016-tab active admin-tab" data-tab="account-info">Account Info</div>
                        <div class="tabs2016-tab admin-tab" data-tab="security">Security</div>
                        <div class="tabs2016-tab admin-tab" data-tab="social">Social</div>
                        <div class="tabs2016-tab admin-tab" data-tab="privacy">Privacy</div>
                        <div class="tabs2016-tab admin-tab" data-tab="billing">Billing</div>
                    </div>
                    <div id="settingsContent" class="settings-card">
                        <div id="tab-account-info" class="corvixz-tab-content active">
                            <h3>Account Info</h3>
                            <div class="settings-field">
                                <label>Username</label>
                                <div class="s-value">
                                    <span id="displayUsername"></span>
                                </div>
                            </div>
                            <div class="settings-field">
                                <label>Password</label>
                                <div class="s-value">
                                    <span>********</span>
                                    <button class="btn-edit" onclick="openPasswordModal()">Edit</button>
                                </div>
                            </div>
                            <div class="s-divider"></div>
                            <div class="settings-field">
                                <label>What should I write here?</label>
                                <textarea id="personalBio" class="form-control" rows="3" placeholder="" style="font-size:14px;resize:vertical;max-width:500px;"></textarea>
                            </div>
                            <button class="btn-save" onclick="savePersonal()">Save</button>
                            <span class="save-notif" id="personalSaveNotif">Saved!</span>
                            <div class="s-divider" style="margin-top:24px;"></div>
                            <h3 style="margin-top:20px;">Website Theme</h3>
                            <div class="settings-field">
                                <label>Theme</label>
                                <div class="settings-theme-row">
                                    <input class="form-control" type="text" value="Website Theme" readonly style="max-width:140px;background:#f5f5f5;"/>
                                    <select id="themeSelect" class="form-control" onchange="saveThemeChoice()">
                                        <option value="default">Default</option>
                                        <option value="obc">OBC Theme</option>
                                        <option value="legacy">Legacy</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div id="tab-security" class="corvixz-tab-content">
                            <p class="corvixz-empty" style="padding:20px 0;">Security settings coming soon.</p>
                        </div>
                        <div id="tab-social" class="corvixz-tab-content">
                            <p class="corvixz-empty" style="padding:20px 0;">Social settings coming soon.</p>
                        </div>
                        <div id="tab-privacy" class="corvixz-tab-content">
                            <p class="corvixz-empty" style="padding:20px 0;">Privacy settings coming soon.</p>
                        </div>
                        <div id="tab-billing" class="corvixz-tab-content">
                            <p class="corvixz-empty" style="padding:20px 0;">Billing settings coming soon.</p>
                        </div>
                        </div>
                    </div>
                </div>
            <div id="footer-placeholder"></div>
        </div>
    </div>

    <div id="passwordModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Change Password</h3>
                <button class="modal-close" onclick="closePasswordModal()">X</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword" placeholder="Enter current password"/>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password"/>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password"/>
                </div>
            </div>
            <div class="modal-footer">
                <span id="passwordError" style="color:#d86868;font-size:13px;font-weight:600;display:none;margin-right:10px;"></span>
                <button class="btn-save" onclick="changePassword()">Change Password</button>
            </div>
        </div>
    </div>

    <script src="../js/auth/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui/include.js"></script>
    <script>
        document.querySelectorAll('.admin-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
                this.classList.add('active');
                document.querySelectorAll('.corvixz-tab-content').forEach(function(c) { c.classList.remove('active'); });
                document.getElementById('tab-' + this.getAttribute('data-tab')).classList.add('active');
            });
        });

        function loadSettings() {
            if (!currentProfile) return;
            document.getElementById('displayUsername').textContent = currentProfile.username || '—';
            var bioEl = document.getElementById('personalBio');
            if (currentProfile.description) bioEl.value = currentProfile.description;
            var themeSel = document.getElementById('themeSelect');
            if (themeSel && typeof getSiteTheme === 'function') themeSel.value = getSiteTheme();
        }

        function saveThemeChoice() {
            var themeSel = document.getElementById('themeSelect');
            if (!themeSel || typeof setSiteTheme !== 'function') return;
            setSiteTheme(themeSel.value);
            window.location.reload();
        }

        function openPasswordModal() {
            document.getElementById('passwordModal').classList.add('show');
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            document.getElementById('passwordError').style.display = 'none';
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('show');
        }

        document.getElementById('passwordModal').addEventListener('click', function(e) {
            if (e.target === this) closePasswordModal();
        });

        async function changePassword() {
            var current = document.getElementById('currentPassword').value;
            var newPw = document.getElementById('newPassword').value;
            var confirm = document.getElementById('confirmPassword').value;
            var errorEl = document.getElementById('passwordError');

            if (!current || !newPw || !confirm) {
                errorEl.textContent = 'Please fill in all fields.';
                errorEl.style.display = 'inline'; return;
            }
            if (newPw !== confirm) {
                errorEl.textContent = 'New passwords do not match.';
                errorEl.style.display = 'inline'; return;
            }
            if (newPw.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters.';
                errorEl.style.display = 'inline'; return;
            }

            errorEl.style.display = 'none';
            try {
                var res = await fetch(AUTH_URL + '/user', {
                    method: 'PUT',
                    headers: authHeaders(),
                    body: JSON.stringify({ password: newPw })
                });
                if (!res.ok) throw new Error('Failed to update password');
                alert('Password changed successfully!');
                closePasswordModal();
            } catch(e) {
                errorEl.textContent = e.message || 'Error changing password';
                errorEl.style.display = 'inline';
            }
        }

        async function savePersonal() {
            if (!currentProfile) return;
            var bio = document.getElementById('personalBio').value.trim();
            try {
                await updateProfile(currentProfile.id, { description: bio });
                currentProfile.description = bio;
                var notif = document.getElementById('personalSaveNotif');
                notif.style.display = 'inline';
                setTimeout(function() { notif.style.display = 'none'; }, 2000);
            } catch(e) { alert('Error saving: ' + e.message); }
        }

        var settingsCheck = setInterval(function() {
            if (currentProfile) { clearInterval(settingsCheck); loadSettings(); }
        }, 100);
    </script>
</body>
</html>
